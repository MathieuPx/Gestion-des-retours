<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYSMA — Calculateur e-liquide</title>

<style>
:root{
  --brand:#0A4D9B;
  --brand2:#1E73D8;
  --bg:#F2F4F7;
  --text:#0F172A;
  --muted:#6B7280;
}

/* RESET */
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0A4D9B,#1E73D8);
  color:#fff;
  padding:26px;
  border-radius:24px;
  margin:16px;
}

/* LOGO */
.hero-top{
  display:flex;
  justify-content:flex-end;
}

.logo-lysma{
  height:60px;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.2));
  animation:swing 5s ease-in-out infinite;
}

@keyframes swing{
  0%{transform:rotate(0deg);}
  20%{transform:rotate(-12deg);}
  40%{transform:rotate(12deg);}
  60%{transform:rotate(-12deg);}
  80%{transform:rotate(12deg);}
  100%{transform:rotate(0deg);}
}

/* TITRE */
.hero h1{
  margin:10px 0 0;
  font-size:36px;
  font-weight:900;
}

.brand-line{
  display:flex;
  gap:6px;
  margin-top:6px;
}

.brand-line em{opacity:.7;}
.brand-line h2{
  margin:0;
  font-size:18px;
  letter-spacing:2px;
}

/* CONTAINER */
.container{
  padding:16px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* INPUT */
input{
  width:100%;
  height:55px;
  font-size:20px;
  font-weight:bold;
  border-radius:14px;
  border:1px solid #ddd;
  padding:10px;
  margin-top:6px;
}

/* BUTTON */
button{
  width:100%;
  height:60px;
  margin-top:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#0A4D9B,#1E73D8);
  color:#fff;
  font-size:20px;
  font-weight:bold;
}

/* RESULT */
.result{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-top">
    <img src="./logo-lysma.png" class="logo-lysma">
  </div>

  <h1>Calculateur e-liquide</h1>

  <div class="brand-line">
    <em>By</em>
    <h2>LYSMA</h2>
    <span>solutions</span>
  </div>
</div>

<div class="container">

  <div class="card">
    <label>Volume total (ml)</label>
    <input id="volume" value="60">

    <label>Nicotine souhaitée (mg)</label>
    <input id="nicotine" value="3">

    <label>Booster (mg)</label>
    <input id="booster" value="20">

    <label>Arôme (%)</label>
    <input id="arome" value="15">

    <button onclick="calcul()">Calculer</button>

    <div class="result" id="result"></div>
  </div>

</div>

<script>
function calcul(){
  let volume = parseFloat(document.getElementById("volume").value);
  let nicotine = parseFloat(document.getElementById("nicotine").value);
  let booster = parseFloat(document.getElementById("booster").value);
  let arome = parseFloat(document.getElementById("arome").value);

  let booster_ml = (volume * nicotine) / booster;
  let arome_ml = volume * (arome / 100);
  let base = volume - booster_ml - arome_ml;

  document.getElementById("result").innerHTML =
    "Booster : " + booster_ml.toFixed(1) + " ml<br>" +
    "Arôme : " + arome_ml.toFixed(1) + " ml<br>" +
    "Base : " + base.toFixed(1) + " ml";
}
</script>

</body>
</html>
